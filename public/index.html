<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word World</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="map-frame" aria-label="Level 2 writing map">
        <header class="game-hud">
          <div class="compass">
            <span>W</span>
          </div>
          <div class="title-stack">
            <p class="eyebrow">Word World</p>
            <h1 id="currentYearTitle">Y1</h1>
          </div>
          <div class="score-card">
            <span>Group XP</span>
            <strong id="groupXp">0</strong>
          </div>
        </header>

        <div id="questMap" class="quest-map">
          <div class="route route-a"></div>
          <div class="route route-b"></div>
          <div id="islandMap" class="island-map"></div>
          <div id="playerLayer" class="player-layer"></div>
        </div>

        <aside id="detailPanel" class="detail-panel">
          <p class="eyebrow">Quest Intel</p>
          <h2>Class Progress</h2>
          <p class="muted">Lesson rewards and player inventory.</p>
        </aside>

        <section class="assessment-dock">
          <div>
            <p class="eyebrow">Assessment</p>
            <h2 id="selectedPlayerName">Explorer</h2>
            <p class="muted">Writing sample ready for review.</p>
          </div>
          <button class="primary-button" type="button" data-action="open-inventory">Assess Player</button>
        </section>

        <section class="roster-dock">
          <div class="dock-heading">
            <p class="eyebrow">Players</p>
            <span id="level">Y1</span>
          </div>
          <div id="playerRoster" class="player-roster"></div>
        </section>

        <section class="reward-feed">
          <p class="eyebrow">Latest Rewards</p>
          <div id="rewardCards" class="reward-cards">
            <p class="empty-state">No rewards yet.</p>
          </div>
        </section>
      </section>
    </main>

    <div id="inventoryModal" class="modal-backdrop" hidden>
      <section class="inventory-modal" role="dialog" aria-modal="true" aria-labelledby="inventoryModalTitle">
        <button id="closeInventoryModal" class="modal-close" type="button" aria-label="Close inventory">x</button>
        <div id="inventoryModalContent"></div>
        <section class="modal-assessment">
          <p class="eyebrow">Assess Work</p>
          <form id="scanForm">
            <label class="upload-chip">
              <input id="imageInput" name="image" type="file" accept="image/*" capture="environment" required />
              <span id="uploadLabel">Take photo</span>
            </label>
            <img id="preview" class="preview" alt="Writing preview" hidden />
            <button class="primary-button" type="submit">Assess Work</button>
          </form>
        </section>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
